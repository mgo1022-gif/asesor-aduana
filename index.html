<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesoría en Comercio Exterior | Gerardo Miño</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Forzar a que la página inicie siempre en la parte superior
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.addEventListener('load', function() {
            window.scrollTo(0, 0);
        });

        function preselectPlan(plan) { document.getElementById('plan_elegido').value = plan; }
        function enviarWhatsApp(e) {
            e.preventDefault();
            // Ahora si algún campo está vacío, dirá 'No especificado'
            const email = document.getElementById('email').value || 'No especificado';
            const link = document.getElementById('link').value || 'No especificado';
            const desc = document.getElementById('descripcion').value || 'No especificado';
            const cant = document.getElementById('cantidad').value || 'No especificado';
            const val = document.getElementById('valor').value || 'No especificado';
            const plan = document.getElementById('plan_elegido').value;
            const tel = "541168731508";
            
            let msg = `📋 *Nueva Solicitud de Asesoría*%0A%0A`;
            msg += `*Plan:* ${plan}%0A*Email:* ${email}%0A%0A`;
            msg += `*MERCADERÍA:*%0A*Desc:* ${desc}%0A*Cant:* ${cant}%0A*Valor:* USD ${val}%0A*Link:* ${link}`;
            
            window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
